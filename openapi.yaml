# =============================================================================
# COMPONENTS
# =============================================================================

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: 1ck_ prefixed API key used as Bearer token

  parameters:
    VaultId:
      name: vault_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SecretPath:
      name: path
      in: path
      required: true
      schema:
        type: string
      description: Secret path (e.g. "db/credentials")
    AgentId:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PolicyId:
      name: policy_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    PaymentRequired:
      description: x402 payment required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PaymentRequirement"

  schemas:

    ProblemDetails:
      type: object
      description: RFC 7807 error envelope
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string

    # --- Auth ---

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        mfa_required:
          type: boolean
        mfa_token:
          type: string

    TokenResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string

    AgentTokenRequest:
      type: object
      required: [agent_id, api_key]
      properties:
        agent_id:
          type: string
          format: uuid
        api_key:
          type: string

    UserApiKeyTokenRequest:
      type: object
      required: [api_key]
      properties:
        api_key:
          type: string

    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        display_name:
          type: string

    SignupResponse:
      type: object
      properties:
        message:
          type: string
        email:
          type: string
        access_token:
          type: string
        token_type:
          type: string

    GoogleAuthRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string

    # --- MFA ---

    MfaStatusResponse:
      type: object
      properties:
        enabled:
          type: boolean

    MfaSetupResponse:
      type: object
      properties:
        otpauth_uri:
          type: string
        secret:
          type: string

    MfaVerifySetupRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string

    MfaVerifySetupResponse:
      type: object
      properties:
        recovery_codes:
          type: array
          items:
            type: string

    MfaVerifyRequest:
      type: object
      required: [code, mfa_token]
      properties:
        code:
          type: string
        mfa_token:
          type: string

    MfaDisableRequest:
      type: object
      properties:
        code:
          type: string
        password:
          type: string

    # --- Device Auth ---

    DeviceCodeRequest:
      type: object
      required: [client_id]
      properties:
        client_id:
          type: string

    DeviceCodeResponse:
      type: object
      properties:
        device_code:
          type: string
        user_code:
          type: string
        verification_uri:
          type: string
          format: uri
        expires_in:
          type: integer
        interval:
          type: integer

    DeviceTokenRequest:
      type: object
      required: [device_code, grant_type]
      properties:
        device_code:
          type: string
        grant_type:
          type: string

    DeviceTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        error:
          type: string
        email:
          type: string
        user_id:
          type: string
        org_id:
          type: string

    DeviceApproveRequest:
      type: object
      required: [user_code]
      properties:
        user_code:
          type: string

    # --- API Keys ---

    CreateApiKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time

    ApiKeyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        key_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time

    ApiKeyCreatedResponse:
      type: object
      properties:
        key:
          $ref: "#/components/schemas/ApiKeyResponse"
        api_key:
          type: string
          description: Full key (shown once)

    ApiKeyListResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyResponse"

    # --- Vaults ---

    CreateVaultRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    VaultResponse:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        created_by:
          type: string
        created_by_type:
          type: string
        created_at:
          type: string
          format: date-time
        cmek_enabled:
          type: boolean
          description: Whether client-managed encryption is enabled
        cmek_fingerprint:
          type: string
          description: SHA-256 fingerprint of the CMEK key (64 hex chars)

    VaultListResponse:
      type: object
      properties:
        vaults:
          type: array
          items:
            $ref: "#/components/schemas/VaultResponse"

    # --- CMEK ---

    EnableCmekRequest:
      type: object
      required: [fingerprint]
      properties:
        fingerprint:
          type: string
          description: SHA-256 hex fingerprint of the CMEK key (64 chars)

    CmekRotateRequest:
      type: object
      required: [new_fingerprint]
      properties:
        new_fingerprint:
          type: string
          description: SHA-256 hex fingerprint of the new CMEK key

    CmekRotationJobResponse:
      type: object
      required: [id, vault_id, status, total_secrets, processed, created_at]
      properties:
        id:
          type: string
          format: uuid
        vault_id:
          type: string
          format: uuid
        old_fingerprint:
          type: string
        new_fingerprint:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        total_secrets:
          type: integer
        processed:
          type: integer
        error:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    # --- Secrets ---

    PutSecretRequest:
      type: object
      required: [value]
      properties:
        type:
          type: string
          description: Secret type (generic, password, api_key, certificate, private_key, ssh_key, env)
          default: generic
        value:
          type: string
        metadata:
          type: object
          additionalProperties: true
        expires_at:
          type: string
          format: date-time
        rotation_policy:
          type: object
          additionalProperties: true
        max_access_count:
          type: integer

    SecretMetadataResponse:
      type: object
      required: [id, path, type, version, created_at]
      properties:
        id:
          type: string
          format: uuid
        path:
          type: string
        type:
          type: string
        version:
          type: integer
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    SecretResponse:
      type: object
      required: [id, path, type, value, version, created_at]
      properties:
        id:
          type: string
          format: uuid
        path:
          type: string
        type:
          type: string
        value:
          type: string
        version:
          type: integer
        metadata:
          type: object
          additionalProperties: true
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        cmek_encrypted:
          type: boolean
          description: Whether this secret value is CMEK-encrypted (requires client-side decryption)

    SecretListResponse:
      type: object
      properties:
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/SecretMetadataResponse"

    # --- Policies ---

    CreatePolicyRequest:
      type: object
      required: [secret_path_pattern, principal_type, principal_id, permissions]
      properties:
        secret_path_pattern:
          type: string
        principal_type:
          type: string
          enum: [user, agent]
        principal_id:
          type: string
        permissions:
          type: array
          items:
            type: string
        conditions:
          type: object
          additionalProperties: true
        expires_at:
          type: string
          format: date-time

    UpdatePolicyRequest:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: string
        conditions:
          type: object
          additionalProperties: true
        expires_at:
          type: string
          format: date-time

    PolicyResponse:
      type: object
      required: [id, vault_id, secret_path_pattern, principal_type, principal_id, permissions, created_at]
      properties:
        id:
          type: string
          format: uuid
        vault_id:
          type: string
          format: uuid
        secret_path_pattern:
          type: string
        principal_type:
          type: string
        principal_id:
          type: string
        permissions:
          type: array
          items:
            type: string
        conditions:
          type: object
          additionalProperties: true
        expires_at:
          type: string
          format: date-time
        created_by:
          type: string
        created_by_type:
          type: string
        created_at:
          type: string
          format: date-time

    PolicyListResponse:
      type: object
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/PolicyResponse"

    # --- Agents ---

    CreateAgentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        auth_method:
          type: string
          enum: [api_key, mtls, oidc_client_credentials]
          default: api_key
          description: Authentication method. api_key generates a one-time key; mtls requires client_cert_fingerprint; oidc_client_credentials requires oidc_issuer and oidc_client_id.
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
        crypto_proxy_enabled:
          type: boolean
          default: false
        tx_to_allowlist:
          type: array
          items:
            type: string
        tx_max_value_eth:
          type: string
        tx_daily_limit_eth:
          type: string
        tx_allowed_chains:
          type: array
          items:
            type: string
        token_ttl_seconds:
          type: integer
          nullable: true
          description: Per-agent token TTL in seconds (overrides global default)
        vault_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Restrict agent to specific vault UUIDs (empty = all vaults in org)
        client_cert_fingerprint:
          type: string
          description: SHA-256 fingerprint of the client certificate (required for mTLS auth)
        oidc_issuer:
          type: string
          description: OIDC issuer URL (required for oidc_client_credentials auth)
        oidc_client_id:
          type: string
          description: OIDC client ID (required for oidc_client_credentials auth)

    UpdateAgentRequest:
      type: object
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        expires_at:
          type: string
          format: date-time
        crypto_proxy_enabled:
          type: boolean
        tx_to_allowlist:
          type: array
          items:
            type: string
        tx_max_value_eth:
          type: string
        tx_daily_limit_eth:
          type: string
        tx_allowed_chains:
          type: array
          items:
            type: string
        token_ttl_seconds:
          type: integer
          nullable: true
        vault_ids:
          type: array
          items:
            type: string
            format: uuid

    AgentResponse:
      type: object
      required: [id, name, auth_method, is_active, crypto_proxy_enabled, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        auth_method:
          type: string
          enum: [api_key, mtls, oidc_client_credentials]
        scopes:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        crypto_proxy_enabled:
          type: boolean
        tx_to_allowlist:
          type: array
          items:
            type: string
        tx_max_value_eth:
          type: string
        tx_daily_limit_eth:
          type: string
        tx_allowed_chains:
          type: array
          items:
            type: string
        token_ttl_seconds:
          type: integer
          nullable: true
        vault_ids:
          type: array
          items:
            type: string
            format: uuid
        client_cert_fingerprint:
          type: string
          description: SHA-256 fingerprint of the client certificate (mTLS agents)
        oidc_issuer:
          type: string
          description: OIDC issuer URL (oidc_client_credentials agents)
        oidc_client_id:
          type: string
          description: OIDC client ID (oidc_client_credentials agents)
        ssh_public_key:
          type: string
          description: Ed25519 SSH public key (base64-encoded, auto-generated at creation)
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_active_at:
          type: string
          format: date-time

    AgentSelfResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        org_id:
          type: string
          format: uuid
        scopes:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        crypto_proxy_enabled:
          type: boolean
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_active_at:
          type: string
          format: date-time
        ssh_public_key:
          type: string
          description: Ed25519 SSH public key (base64-encoded)

    AgentCreatedResponse:
      type: object
      required: [agent]
      properties:
        agent:
          $ref: "#/components/schemas/AgentResponse"
        api_key:
          type: string
          description: One-time API key (only present for api_key auth method)

    AgentListResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentResponse"

    AgentKeyRotatedResponse:
      type: object
      properties:
        api_key:
          type: string

    # --- Transactions ---

    SubmitTransactionRequest:
      type: object
      required: [to, value, chain]
      properties:
        to:
          type: string
          description: Destination address (0x-prefixed)
        value:
          type: string
          description: Value in ETH
        chain:
          type: string
          description: Chain name or numeric ID
        data:
          type: string
          description: Hex-encoded calldata
        signing_key_path:
          type: string
        nonce:
          type: integer
        gas_price:
          type: string
        gas_limit:
          type: integer
        max_fee_per_gas:
          type: string
        max_priority_fee_per_gas:
          type: string
        simulate_first:
          type: boolean
          default: false

    SimulateTransactionRequest:
      type: object
      required: [to, value, chain]
      properties:
        to:
          type: string
        value:
          type: string
        chain:
          type: string
        data:
          type: string
        signing_key_path:
          type: string
        gas_limit:
          type: integer

    SimulateBundleRequest:
      type: object
      required: [transactions]
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/SimulateTransactionRequest"

    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        chain:
          type: string
        chain_id:
          type: integer
        to:
          type: string
        value_wei:
          type: string
        status:
          type: string
          enum: [pending, signed, broadcast, failed, simulation_failed]
        signed_tx:
          type: string
        tx_hash:
          type: string
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        signed_at:
          type: string
          format: date-time
        simulation_id:
          type: string
        simulation_status:
          type: string
        tenderly_dashboard_url:
          type: string
          format: uri
        max_fee_per_gas:
          type: string
        max_priority_fee_per_gas:
          type: string

    TransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionResponse"

    BalanceChange:
      type: object
      properties:
        address:
          type: string
        token:
          type: string
        token_symbol:
          type: string
        before:
          type: string
        after:
          type: string
        change:
          type: string

    SimulationResponse:
      type: object
      properties:
        simulation_id:
          type: string
        status:
          type: string
          enum: [success, reverted, error]
        gas_used:
          type: integer
        gas_estimate_usd:
          type: string
        balance_changes:
          type: array
          items:
            $ref: "#/components/schemas/BalanceChange"
        error:
          type: string
        error_code:
          type: string
        error_human_readable:
          type: string
        revert_reason:
          type: string
        tenderly_dashboard_url:
          type: string
          format: uri
        simulated_at:
          type: string
          format: date-time

    BundleSimulationResponse:
      type: object
      properties:
        simulations:
          type: array
          items:
            $ref: "#/components/schemas/SimulationResponse"

    # --- Chains ---

    ChainResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        chain_id:
          type: integer
        rpc_url:
          type: string
        ws_url:
          type: string
        explorer_url:
          type: string
        native_currency:
          type: string
        is_testnet:
          type: boolean
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChainListResponse:
      type: object
      properties:
        chains:
          type: array
          items:
            $ref: "#/components/schemas/ChainResponse"

    CreateChainRequest:
      type: object
      required: [name, display_name, chain_id]
      properties:
        name:
          type: string
        display_name:
          type: string
        chain_id:
          type: integer
        rpc_url:
          type: string
        ws_url:
          type: string
        explorer_url:
          type: string
        native_currency:
          type: string
          default: ETH
        is_testnet:
          type: boolean
          default: false
        is_enabled:
          type: boolean
          default: true

    UpdateChainRequest:
      type: object
      properties:
        display_name:
          type: string
        rpc_url:
          type: string
        ws_url:
          type: string
        explorer_url:
          type: string
        native_currency:
          type: string
        is_testnet:
          type: boolean
        is_enabled:
          type: boolean

    # --- Sharing ---

    CreateShareRequest:
      type: object
      required: [recipient_type, expires_at]
      properties:
        recipient_type:
          type: string
          enum: [user, agent, external_email, anyone_with_link, creator]
        recipient_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        permissions:
          type: array
          items:
            type: string
        max_access_count:
          type: integer
        expires_at:
          type: string
          format: date-time
        passphrase:
          type: string
        ip_allowlist:
          type: array
          items:
            type: string

    ShareResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        share_url:
          type: string
          format: uri
        recipient_type:
          type: string
        recipient_email:
          type: string
        expires_at:
          type: string
          format: date-time
        max_access_count:
          type: integer

    SharedSecretResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        path:
          type: string
        type:
          type: string
        value:
          type: string
        access_count:
          type: integer
        max_access_count:
          type: integer

    ShareListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        secret_path:
          type: string
        recipient_type:
          type: string
        recipient_email:
          type: string
        access_count:
          type: integer
        max_access_count:
          type: integer
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        is_expired:
          type: boolean
        is_accepted:
          type: boolean

    ShareListResponse:
      type: object
      properties:
        shares:
          type: array
          items:
            $ref: "#/components/schemas/ShareListItem"

    # --- Organization ---

    OrgMemberResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        display_name:
          type: string
        role:
          type: string
        auth_method:
          type: string
        created_at:
          type: string
          format: date-time

    OrgMemberListResponse:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/OrgMemberResponse"

    UpdateMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, admin, member]

    InviteMemberRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        role:
          type: string

    InviteMemberResponse:
      type: object
      properties:
        message:
          type: string
        email:
          type: string

    # --- Billing ---

    UsageSummaryResponse:
      type: object
      properties:
        billing_tier:
          type: string
        free_tier_limit:
          type: integer
        current_month:
          type: object
          properties:
            total_requests:
              type: integer
            paid_requests:
              type: integer
            free_requests:
              type: integer
            total_cost_usd:
              type: string

    UsageHistoryResponse:
      type: object
      properties:
        events:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              principal_type:
                type: string
              principal_id:
                type: string
              method:
                type: string
              endpoint:
                type: string
              status_code:
                type: integer
              price_usd:
                type: string
              is_paid:
                type: boolean
              created_at:
                type: string
                format: date-time

    SubscribeRequest:
      type: object
      required: [tier, interval]
      properties:
        tier:
          type: string
          enum: [pro, business]
        interval:
          type: string
          enum: [monthly, yearly]
        trial:
          type: boolean
          default: true

    TopupRequest:
      type: object
      required: [amount_usd]
      properties:
        amount_usd:
          type: integer
          minimum: 5
          maximum: 1000

    OverageMethodRequest:
      type: object
      required: [method]
      properties:
        method:
          type: string
          enum: [credits, x402]

    CheckoutUrlResponse:
      type: object
      properties:
        checkout_url:
          type: string
          format: uri

    PortalUrlResponse:
      type: object
      properties:
        portal_url:
          type: string
          format: uri

    SubscriptionResponse:
      type: object
      properties:
        tier:
          type: string
        interval:
          type: string
        period_end:
          type: string
          format: date-time
        status:
          type: string
        credit_balance_cents:
          type: integer
        credit_balance_usd:
          type: string
        overage_method:
          type: string
        usage:
          type: object
          properties:
            requests:
              $ref: "#/components/schemas/UsageMeter"
            secrets:
              $ref: "#/components/schemas/UsageMeter"
            agents:
              $ref: "#/components/schemas/UsageMeter"
            vaults:
              $ref: "#/components/schemas/UsageMeter"
            team_members:
              $ref: "#/components/schemas/UsageMeter"
            proxy_transactions:
              $ref: "#/components/schemas/UsageMeter"
            shares:
              $ref: "#/components/schemas/UsageMeter"

    UsageMeter:
      type: object
      properties:
        used:
          type: integer
        limit:
          type: integer

    CreditBalanceResponse:
      type: object
      properties:
        balance_cents:
          type: integer
        balance_usd:
          type: string
        expiring_within_90_days:
          type: object
          properties:
            amount_cents:
              type: integer
            earliest_expiry:
              type: string
              format: date-time

    CreditTransactionsListResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              type:
                type: string
              amount_cents:
                type: integer
              balance_after_cents:
                type: integer
              description:
                type: string
              created_at:
                type: string
                format: date-time
        page:
          type: integer
        limit:
          type: integer

    OverageMethodResponse:
      type: object
      properties:
        overage_method:
          type: string

    # --- Audit ---

    AuditEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        count:
          type: integer

    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
        actor_id:
          type: string
        actor_type:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
        org_id:
          type: string
          format: uuid
        details:
          type: object
          additionalProperties: true
        ip_address:
          type: string
        created_at:
          type: string
          format: date-time

    # --- Security ---

    CreateIpRuleRequest:
      type: object
      required: [rule_type, cidr]
      properties:
        rule_type:
          type: string
          enum: [allow, deny]
        cidr:
          type: string
        label:
          type: string
        applies_to:
          type: string

    IpRuleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        rule_type:
          type: string
        cidr:
          type: string
        label:
          type: string
        applies_to:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    IpRulesListResponse:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/IpRuleResponse"

    # --- Admin ---

    SettingResponse:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        updated_by:
          type: string
        updated_at:
          type: string
          format: date-time

    SettingsListResponse:
      type: object
      properties:
        settings:
          type: array
          items:
            $ref: "#/components/schemas/SettingResponse"

    UpdateSettingRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string

    X402ConfigResponse:
      type: object
      properties:
        pay_to:
          type: string
        network:
          type: string
        scheme:
          type: string
        free_tier_limit:
          type: integer
        facilitator_url:
          type: string

    AdminUsersListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              email:
                type: string
              display_name:
                type: string
              role:
                type: string
              auth_method:
                type: string
              org_id:
                type: string
                format: uuid
              org_name:
                type: string
              created_at:
                type: string
                format: date-time
              free_tier_override:
                type: integer
              is_sponsored:
                type: boolean
              current_month_requests:
                type: integer
        total:
          type: integer

    UpdateOrgLimitsRequest:
      type: object
      properties:
        free_tier_override:
          type: integer
        is_sponsored:
          type: boolean

    OrgLimitsResponse:
      type: object
      properties:
        org_id:
          type: string
          format: uuid
        free_tier_override:
          type: integer
        is_sponsored:
          type: boolean

    # --- x402 ---

    PaymentRequirement:
      type: object
      properties:
        x402Version:
          type: integer
        accepts:
          type: array
          items:
            type: object
            properties:
              scheme:
                type: string
              network:
                type: string
              payTo:
                type: string
              price:
                type: string
              requiredDeadlineSeconds:
                type: integer
        description:
          type: string

    # --- BlockRun ---

    ConfigureBlockrunRequest:
      type: object
      required: [wallet_secret_path]
      properties:
        wallet_secret_path:
          type: string
          description: Vault secret path containing the BlockRun wallet private key
        routing_profile:
          type: string
          enum: [fast, balanced, powerful, cheap, reasoning]
          default: balanced
          description: Default smart-routing profile for requests without an explicit model
        max_daily_spend_usd:
          type: number
          format: double
          description: Maximum daily AI spend in USD (0 = unlimited)
          default: 0
        allowed_models:
          type: array
          items:
            type: string
          description: Allowlist of model IDs the agent may use (empty = all)

    BlockrunConfig:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
        enabled:
          type: boolean
        wallet_secret_path:
          type: string
        routing_profile:
          type: string
          enum: [fast, balanced, powerful, cheap, reasoning]
        max_daily_spend_usd:
          type: number
          format: double
        allowed_models:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BlockrunChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/BlockrunToolCall"
        tool_call_id:
          type: string
          description: Required when role is tool

    BlockrunToolDefinition:
      type: object
      required: [type, function]
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          required: [name]
          properties:
            name:
              type: string
            description:
              type: string
            parameters:
              type: object
              description: JSON Schema for function parameters

    BlockrunToolCall:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [function]
        function:
          type: object
          properties:
            name:
              type: string
            arguments:
              type: string
              description: JSON-encoded arguments

    BlockrunChatCompletionRequest:
      type: object
      required: [messages]
      properties:
        model:
          type: string
          description: "Model ID (e.g. openai/gpt-4o). Falls back to agent's routing_profile if omitted."
        mode:
          type: string
          enum: [fast, balanced, powerful, cheap, reasoning]
          description: Smart routing mode (ignored when model is specified)
        messages:
          type: array
          items:
            $ref: "#/components/schemas/BlockrunChatMessage"
        max_tokens:
          type: integer
          default: 1024
        temperature:
          type: number
          format: double
          minimum: 0
          maximum: 2
          default: 1
        tools:
          type: array
          items:
            $ref: "#/components/schemas/BlockrunToolDefinition"
        search_parameters:
          type: object
          description: Optional Grok live-search parameters
          properties:
            mode:
              type: string
              enum: [auto, on, off]
            sources:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: [web, x, news]

    BlockrunChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                $ref: "#/components/schemas/BlockrunChatMessage"
              finish_reason:
                type: string
                enum: [stop, length, tool_calls]
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
        citations:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
              title:
                type: string
        cost_usd:
          type: number
          format: double
          description: Actual cost of this request in USD

    BlockrunModel:
      type: object
      properties:
        id:
          type: string
          description: "Model ID (e.g. openai/gpt-4o)"
        name:
          type: string
        provider:
          type: string
        category:
          type: string
          enum: [chat, reasoning, image, embedding]
        input_price_per_million:
          type: number
          format: double
          description: Cost per 1M input tokens in USD
        output_price_per_million:
          type: number
          format: double
          description: Cost per 1M output tokens in USD
        max_context:
          type: integer
          description: Maximum context window in tokens
        supports_tools:
          type: boolean
        supports_search:
          type: boolean

    BlockrunImageRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          description: Text description of the image to generate
        model:
          type: string
          enum: [openai/dall-e-3, together/flux-schnell]
          default: openai/dall-e-3
        size:
          type: string
          enum: [1024x1024, 1792x1024, 1024x1792]
          default: 1024x1024
        quality:
          type: string
          enum: [standard, hd]
          default: standard

    BlockrunImageResponse:
      type: object
      properties:
        images:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
              revised_prompt:
                type: string
        model:
          type: string
        cost_usd:
          type: number
          format: double

    BlockrunSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: Search query (can include @handles, topics)
        max_results:
          type: integer
          minimum: 1
          maximum: 25
          default: 10

    BlockrunSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              url:
                type: string
                format: uri
              snippet:
                type: string
              source:
                type: string
                enum: [web, x, news]
              published_at:
                type: string
                format: date-time
        model:
          type: string
        cost_usd:
          type: number
          format: double

    BlockrunUsageResponse:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        total_spend_usd:
          type: number
          format: double
        total_requests:
          type: integer
        by_model:
          type: array
          items:
            type: object
            properties:
              model:
                type: string
              requests:
                type: integer
              input_tokens:
                type: integer
              output_tokens:
                type: integer
              spend_usd:
                type: number
                format: double
        daily_spend_usd:
          type: number
          format: double
          description: Spend for the current UTC day
        daily_limit_usd:
          type: number
          format: double
          description: Configured daily limit (0 = unlimited)

    # --- Health ---

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        version:
          type: string
