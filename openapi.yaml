                tier:
                    type: string
                    enum: [free, pro, business, enterprise]
                duration_days:
                    type: integer
                    description: How many days the tier lasts (default 365). Use 90 for a 3-month trial.
                    minimum: 1
                    maximum: 3650

        # --- Treasury ---

        CreateTreasuryRequest:
            type: object
            required: [name, safe_address]
            properties:
                name:
                    type: string
                    description: Display name (1–128 characters)
                safe_address:
                    type: string
                    description: Deployed Safe contract address (0x-prefixed, 42 characters)
                chain:
                    type: string
                    description: Chain name (default base)
                chain_id:
                    type: integer
                    description: EVM chain ID (default 8453 for Base)
                threshold:
                    type: integer
                    minimum: 1
                    description: Safe threshold (default 1)
                signers:
                    type: array
                    items:
                        $ref: "#/components/schemas/CreateTreasurySignerEntry"

        CreateTreasurySignerEntry:
            type: object
            required: [signer_type, signer_id, signer_address]
            properties:
                signer_type:
                    type: string
                    enum: [user, agent]
                signer_id:
                    type: string
                    format: uuid
                signer_address:
                    type: string
                    description: EVM address (0x-prefixed)

        UpdateTreasuryRequest:
            type: object
            properties:
                name:
                    type: string
                threshold:
                    type: integer
                    minimum: 1

        TreasuryResponse:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                safe_address:
                    type: string
                chain:
                    type: string
                chain_id:
                    type: integer
                threshold:
                    type: integer
                created_by:
                    type: string
                    format: uuid
                signers:
                    type: array
                    items:
                        $ref: "#/components/schemas/TreasurySignerResponse"
                created_at:
                    type: string
                    format: date-time

        TreasurySignerResponse:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                signer_type:
                    type: string
                    enum: [user, agent]
                signer_id:
                    type: string
                    format: uuid
                signer_address:
                    type: string
                added_at:
                    type: string
                    format: date-time

        AddSignerRequest:
            type: object
            required: [signer_type, signer_id, signer_address]
            properties:
                signer_type:
                    type: string
                    enum: [user, agent]
                signer_id:
                    type: string
                    format: uuid
                signer_address:
                    type: string

        AccessRequestResponse:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                treasury_id:
                    type: string
                    format: uuid
                agent_id:
                    type: string
                    format: uuid
                status:
                    type: string
                    enum: [pending, approved, denied]
                reason:
                    type: string
                requested_at:
                    type: string
                    format: date-time
                resolved_by:
                    type: string
                    format: uuid
                resolved_at:
                    type: string
                    format: date-time

        # --- x402 ---

        PaymentRequirement:
            type: object
            properties:
                x402Version:
                    type: integer
                accepts:
                    type: array
                    items:
                        type: object
                        properties:
                            scheme:
                                type: string
                            network:
                                type: string
                            payTo:
                                type: string
                            price:
                                type: string
                            requiredDeadlineSeconds:
                                type: integer
                description:
                    type: string

        # --- Shroud Activity ---

        ShroudActivityEvent:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                org_id:
                    type: string
                    format: uuid
                agent_id:
                    type: string
                provider:
                    type: string
                model:
                    type: string
                action:
                    type: string
                    description: Action taken (allowed, blocked, warned)
                request_tokens:
                    type: integer
                response_tokens:
                    type: integer
                latency_ms:
                    type: integer
                had_secrets_redacted:
                    type: boolean
                had_pii_detected:
                    type: boolean
                injection_score:
                    type: number
                policy_violations:
                    type: array
                    items:
                        type: string
                metadata:
                    type: object
                timestamp:
                    type: string
                    format: date-time

        IngestShroudActivityRequest:
            type: object
            required: [agent_id, action]
            properties:
                agent_id:
                    type: string
                provider:
                    type: string
                model:
                    type: string
                action:
                    type: string
                request_tokens:
                    type: integer
                    default: 0
                response_tokens:
                    type: integer
                    default: 0
                latency_ms:
                    type: integer
                had_secrets_redacted:
                    type: boolean
                    default: false
                had_pii_detected:
                    type: boolean
                    default: false
                injection_score:
                    type: number
                    default: 0
                policy_violations:
                    type: array
                    items:
                        type: string
                metadata:
                    type: object

        ShroudThreatSummary:
            type: object
            properties:
                total_requests:
                    type: integer
                    format: int64
                total_requests_prev:
                    type: integer
                    format: int64
                blocked_requests:
                    type: integer
                    format: int64
                detectors_triggered:
                    type: integer
                    format: int64
                active_agents:
                    type: integer
                    format: int64
                detectors:
                    type: array
                    items:
                        $ref: "#/components/schemas/ShroudDetectorStats"
                flagged_requests:
                    type: array
                    items:
                        $ref: "#/components/schemas/ShroudFlaggedRequest"

        ShroudDetectorStats:
            type: object
            properties:
                detector:
                    type: string
                detections:
                    type: integer
                    format: int64
                blocks:
                    type: integer
                    format: int64
                actions:
                    type: object
                    properties:
                        blocked:
                            type: integer
                            format: int64
                        warned:
                            type: integer
                            format: int64
                        logged:
                            type: integer
                            format: int64

        ShroudFlaggedRequest:
            type: object
            properties:
                id:
                    type: string
                timestamp:
                    type: string
                    format: date-time
                agent_id:
                    type: string
                agent_name:
                    type: string
                score:
                    type: number
                reason:
                    type: string
                action:
                    type: string
                    enum: [blocked, warned, logged]

        # --- Health ---

        HealthResponse:
            type: object
            properties:
                status:
                    type: string
                    enum: [healthy, degraded]
                version:
                    type: string
