openapi: 3.1.0

info:
  title: 1Claw API
  version: 2.1.0
  description: |
    Secure secret management for AI agents. Provides vaults, secrets,
    policy-based access control, agent identity, crypto transaction proxy,
    sharing, billing, and audit logging.

    All endpoints require JWT Bearer authentication unless marked with
    `security: []`.
  contact:
    email: ops@1claw.xyz

servers:
  - url: http://localhost:8443
    description: Development
  - url: https://api.1claw.xyz
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Authentication
    description: Credential exchange, MFA, device auth, token management
  - name: API Keys
    description: Personal API key management
  - name: Vaults
    description: Vault lifecycle operations
  - name: Secrets
    description: Secret CRUD within vaults
  - name: Policies
    description: Access policy management
  - name: Agents
    description: Agent identity and key management
  - name: Transactions
    description: Crypto transaction proxy (signing, simulation)
  - name: Chains
    description: Blockchain chain registry
  - name: Sharing
    description: Secret sharing links
  - name: Organization
    description: Org membership and roles
  - name: Billing
    description: Subscriptions, credits, and usage
  - name: Audit
    description: Immutable audit event log
  - name: Security
    description: IP rules and security configuration
  - name: Admin
    description: Platform administration
  - name: Health
    description: Service health checks
  - name: BlockRun
    description: AI inference proxy via BlockRun (chat, images, search)

# =============================================================================
# PATHS
# =============================================================================

paths:

  # ---------------------------------------------------------------------------
  # Authentication
  # ---------------------------------------------------------------------------

  /v1/auth/token:
    post:
      tags: [Authentication]
      summary: Login with email and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated (or MFA required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Authentication]
      summary: Revoke current token
      operationId: revokeToken
      responses:
        "204":
          description: Token revoked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/agent-token:
    post:
      tags: [Authentication]
      summary: Exchange agent credentials for JWT
      operationId: agentToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentTokenRequest"
      responses:
        "200":
          description: Agent JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/api-key-token:
    post:
      tags: [Authentication]
      summary: Exchange user API key for JWT
      operationId: apiKeyToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserApiKeyTokenRequest"
      responses:
        "200":
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh an expiring JWT
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/signup:
    post:
      tags: [Authentication]
      summary: Create a new account
      operationId: signup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Account created (pending verification or auto-login)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/verify-email:
    post:
      tags: [Authentication]
      summary: Verify email address
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/google:
    post:
      tags: [Authentication]
      summary: Authenticate with Google OAuth
      operationId: googleAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleAuthRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/change-password:
    post:
      tags: [Authentication]
      summary: Change current user's password
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed
        "400":
          $ref: "#/components/responses/BadRequest"

  # MFA

  /v1/auth/mfa/status:
    get:
      tags: [Authentication]
      summary: Check MFA enrollment status
      operationId: mfaStatus
      responses:
        "200":
          description: MFA status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaStatusResponse"

  /v1/auth/mfa/setup:
    post:
      tags: [Authentication]
      summary: Begin MFA enrollment
      operationId: mfaSetup
      responses:
        "200":
          description: TOTP setup details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResponse"

  /v1/auth/mfa/verify-setup:
    post:
      tags: [Authentication]
      summary: Confirm MFA enrollment with a TOTP code
      operationId: mfaVerifySetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifySetupRequest"
      responses:
        "200":
          description: MFA enabled, recovery codes returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaVerifySetupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/mfa/verify:
    post:
      tags: [Authentication]
      summary: Verify MFA code during login
      operationId: mfaVerify
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyRequest"
      responses:
        "200":
          description: MFA verified, JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/mfa:
    delete:
      tags: [Authentication]
      summary: Disable MFA
      operationId: mfaDisable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaDisableRequest"
      responses:
        "204":
          description: MFA disabled
        "400":
          $ref: "#/components/responses/BadRequest"

  # Device Auth (CLI)

  /v1/auth/device/code:
    post:
      tags: [Authentication]
      summary: Request a device authorization code
      operationId: deviceCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceCodeRequest"
      responses:
        "200":
          description: Device code issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCodeResponse"

  /v1/auth/device/token:
    post:
      tags: [Authentication]
      summary: Poll for device authorization token
      operationId: deviceToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceTokenRequest"
      responses:
        "200":
          description: Token issued or authorization pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceTokenResponse"

  /v1/auth/device/code/{user_code}:
    get:
      tags: [Authentication]
      summary: Check device code status
      operationId: deviceCodeStatus
      security: []
      parameters:
        - name: user_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device code details
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/auth/device/approve:
    post:
      tags: [Authentication]
      summary: Approve a CLI device login
      operationId: deviceApprove
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceApproveRequest"
      responses:
        "200":
          description: Device approved

  /v1/auth/device/deny:
    post:
      tags: [Authentication]
      summary: Deny a CLI device login
      operationId: deviceDeny
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceApproveRequest"
      responses:
        "200":
          description: Device denied

  # ---------------------------------------------------------------------------
  # Personal API Keys
  # ---------------------------------------------------------------------------

  /v1/auth/api-keys:
    post:
      tags: [API Keys]
      summary: Create a personal API key
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key created (full key shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [API Keys]
      summary: List personal API keys
      operationId: listApiKeys
      responses:
        "200":
          description: List of API keys (masked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"

  /v1/auth/api-keys/{key_id}:
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      operationId: revokeApiKey
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Key revoked
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Vaults
  # ---------------------------------------------------------------------------

  /v1/vaults:
    post:
      tags: [Vaults]
      summary: Create a vault
      operationId: createVault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVaultRequest"
      responses:
        "201":
          description: Vault created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Vaults]
      summary: List vaults
      operationId: listVaults
      responses:
        "200":
          description: List of vaults
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultListResponse"

  /v1/vaults/{vault_id}:
    get:
      tags: [Vaults]
      summary: Get vault details
      operationId: getVault
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Vault details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Vaults]
      summary: Delete a vault
      operationId: deleteVault
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "204":
          description: Vault deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # CMEK (Customer-Managed Encryption Keys)
  # ---------------------------------------------------------------------------

  /v1/vaults/{vault_id}/cmek:
    post:
      tags: [CMEK]
      summary: Enable CMEK on a vault
      operationId: enableCmek
      description: |
        Enable client-side encryption on a vault. Requires Business or Enterprise plan.
        Only the key's SHA-256 fingerprint is stored — the key never touches the server.
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnableCmekRequest"
      responses:
        "200":
          description: CMEK enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      tags: [CMEK]
      summary: Disable CMEK on a vault
      operationId: disableCmek
      description: |
        Disable client-side encryption. Existing CMEK-encrypted secrets still require
        the key to decrypt. New secrets will use HSM-only encryption.
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: CMEK disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/vaults/{vault_id}/cmek-rotate:
    post:
      tags: [CMEK]
      summary: Start server-assisted CMEK key rotation
      operationId: rotateCmek
      description: |
        Re-encrypts all secrets from the old CMEK key to the new one.
        Keys are passed in headers (TLS-only) and exist in server memory
        only during the rotation. Batched in groups of 100 secrets.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: x-cmek-old-key
          in: header
          required: true
          schema:
            type: string
          description: Base64-encoded old CMEK key (32 bytes)
        - name: x-cmek-new-key
          in: header
          required: true
          schema:
            type: string
          description: Base64-encoded new CMEK key (32 bytes)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmekRotateRequest"
      responses:
        "202":
          description: Rotation job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmekRotationJobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/vaults/{vault_id}/cmek-rotate/{job_id}:
    get:
      tags: [CMEK]
      summary: Get CMEK rotation job status
      operationId: getCmekRotationJob
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Rotation job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmekRotationJobResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Secrets
  # ---------------------------------------------------------------------------

  /v1/vaults/{vault_id}/secrets:
    get:
      tags: [Secrets]
      summary: List secrets in a vault
      operationId: listSecrets
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: prefix
          in: query
          schema:
            type: string
          description: Filter by path prefix
      responses:
        "200":
          description: Secret metadata list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/vaults/{vault_id}/secrets/{path}:
    put:
      tags: [Secrets]
      summary: Store or update a secret
      operationId: putSecret
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/SecretPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutSecretRequest"
      responses:
        "201":
          description: Secret created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretMetadataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Secrets]
      summary: Retrieve a decrypted secret
      operationId: getSecret
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/SecretPath"
      responses:
        "200":
          description: Decrypted secret value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretResponse"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Secrets]
      summary: Delete a secret
      operationId: deleteSecret
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/SecretPath"
      responses:
        "204":
          description: Secret deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Policies
  # ---------------------------------------------------------------------------

  /v1/vaults/{vault_id}/policies:
    post:
      tags: [Policies]
      summary: Create an access policy
      operationId: createPolicy
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyRequest"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Policies]
      summary: List policies on a vault
      operationId: listPolicies
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Policy list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyListResponse"

  /v1/vaults/{vault_id}/policies/{policy_id}:
    put:
      tags: [Policies]
      summary: Update a policy
      operationId: updatePolicy
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/PolicyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyRequest"
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Policies]
      summary: Revoke a policy
      operationId: deletePolicy
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/PolicyId"
      responses:
        "204":
          description: Policy revoked
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Agents
  # ---------------------------------------------------------------------------

  /v1/agents:
    post:
      tags: [Agents]
      summary: Register a new agent
      operationId: createAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created with one-time API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Agents]
      summary: List agents
      operationId: listAgents
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"

  /v1/agents/me:
    get:
      tags: [Agents]
      summary: Get the calling agent's own profile
      operationId: getAgentSelf
      responses:
        "200":
          description: Agent self profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSelfResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/agents/{agent_id}:
    get:
      tags: [Agents]
      summary: Get agent details
      operationId: getAgent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Agents]
      summary: Update an agent
      operationId: updateAgent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Agents]
      summary: Delete an agent
      operationId: deleteAgent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "204":
          description: Agent deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/agents/{agent_id}/rotate-key:
    post:
      tags: [Agents]
      summary: Rotate agent API key
      operationId: rotateAgentKey
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: New API key returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentKeyRotatedResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Transactions (Crypto Proxy)
  # ---------------------------------------------------------------------------

  /v1/agents/{agent_id}/transactions:
    post:
      tags: [Transactions]
      summary: Submit a transaction for signing
      operationId: submitTransaction
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTransactionRequest"
      responses:
        "201":
          description: Transaction signed (and optionally broadcast)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Simulation reverted (when simulate_first is true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
    get:
      tags: [Transactions]
      summary: List agent transactions
      operationId: listTransactions
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /v1/agents/{agent_id}/transactions/{tx_id}:
    get:
      tags: [Transactions]
      summary: Get a transaction by ID
      operationId: getTransaction
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - name: tx_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/agents/{agent_id}/transactions/simulate:
    post:
      tags: [Transactions]
      summary: Simulate a transaction via Tenderly
      operationId: simulateTransaction
      parameters:
