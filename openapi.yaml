    # ---------------------------------------------------------------------------
    # Treasury
    # ---------------------------------------------------------------------------

    /v1/treasury:
        post:
            tags: [Treasury]
            summary: Create a treasury (Safe multisig)
            operationId: createTreasury
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CreateTreasuryRequest"
            responses:
                "201":
                    description: Treasury created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TreasuryResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
        get:
            tags: [Treasury]
            summary: List treasuries
            operationId: listTreasuries
            security:
                - BearerAuth: []
            responses:
                "200":
                    description: List of treasuries
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    treasuries:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/TreasuryResponse"
                "401":
                    $ref: "#/components/responses/Unauthorized"

    /v1/treasury/{treasury_id}:
        get:
            tags: [Treasury]
            summary: Get treasury details
            operationId: getTreasury
            security:
                - BearerAuth: []
            parameters:
                - name: treasury_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Treasury details
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TreasuryResponse"
                "404":
                    $ref: "#/components/responses/NotFound"
        patch:
            tags: [Treasury]
            summary: Update treasury name and/or threshold
            operationId: updateTreasury
            security:
                - BearerAuth: []
            parameters:
                - name: treasury_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UpdateTreasuryRequest"
            responses:
                "200":
                    description: Treasury updated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TreasuryResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
        delete:
            tags: [Treasury]
            summary: Delete a treasury and its signers
            operationId: deleteTreasury
            security:
                - BearerAuth: []
            parameters:
                - name: treasury_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Treasury deleted
                "404":
                    $ref: "#/components/responses/NotFound"

    /v1/treasury/{treasury_id}/signers:
        post:
            tags: [Treasury]
            summary: Add a signer to a treasury
            operationId: addTreasurySigner
            security:
                - BearerAuth: []
            parameters:
                - name: treasury_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AddSignerRequest"
            responses:
                "201":
                    description: Signer added
                "400":
                    $ref: "#/components/responses/BadRequest"

    /v1/treasury/{treasury_id}/signers/{signer_id}:
        delete:
            tags: [Treasury]
            summary: Remove a signer from a treasury
            operationId: removeTreasurySigner
            security:
                - BearerAuth: []
            parameters:
                - name: treasury_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: signer_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Signer removed
                "404":
                    $ref: "#/components/responses/NotFound"

    /v1/treasury/{treasury_id}/access-requests:
        post:
            tags: [Treasury]
            summary: Request access to a treasury (agent-only)
            operationId: requestTreasuryAccess
            security:
                - BearerAuth: []
            parameters:
                - name: treasury_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "201":
                    description: Access request created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AccessRequestResponse"
                "403":
                    $ref: "#/components/responses/Forbidden"
        get:
            tags: [Treasury]
            summary: List access requests for a treasury
            operationId: listTreasuryAccessRequests
            security:
                - BearerAuth: []
            parameters:
                - name: treasury_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: List of access requests
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    requests:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/AccessRequestResponse"

    /v1/treasury/{treasury_id}/access-requests/{request_id}/approve:
        post:
            tags: [Treasury]
            summary: Approve an access request
            operationId: approveTreasuryAccess
            security:
                - BearerAuth: []
            parameters:
                - name: treasury_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: request_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Access request approved
                "404":
                    $ref: "#/components/responses/NotFound"

    /v1/treasury/{treasury_id}/access-requests/{request_id}/deny:
        post:
            tags: [Treasury]
            summary: Deny an access request
            operationId: denyTreasuryAccess
            security:
                - BearerAuth: []
            parameters:
                - name: treasury_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: request_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Access request denied
                "404":
                    $ref: "#/components/responses/NotFound"

    # ---------------------------------------------------------------------------
    # Admin
    # ---------------------------------------------------------------------------

    /v1/admin/settings:
        get:
            tags: [Admin]
            summary: List platform settings
            operationId: adminListSettings
            responses:
                "200":
                    description: Settings list
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SettingsListResponse"

    /v1/admin/settings/{key}:
        put:
            tags: [Admin]
            summary: Update a platform setting
            operationId: adminUpdateSetting
            parameters:
                - name: key
                  in: path
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UpdateSettingRequest"
            responses:
                "200":
                    description: Setting updated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SettingResponse"
        delete:
            tags: [Admin]
            summary: Delete a platform setting
            operationId: adminDeleteSetting
            parameters:
                - name: key
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "204":
                    description: Setting deleted

    /v1/admin/x402:
        get:
            tags: [Admin]
            summary: Get x402 payment config
            operationId: adminGetX402Config
            responses:
                "200":
                    description: x402 config
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/X402ConfigResponse"
        put:
            tags: [Admin]
            summary: Update x402 payment config
            operationId: adminUpdateX402Config
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/X402ConfigResponse"
            responses:
                "200":
                    description: Config updated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/X402ConfigResponse"

    /v1/admin/users:
        get:
            tags: [Admin]
            summary: List all platform users
            operationId: adminListUsers
            responses:
                "200":
                    description: User list
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AdminUsersListResponse"

    /v1/admin/users/{user_id}:
        delete:
            tags: [Admin]
            summary: Delete a user (cascade)
            operationId: adminDeleteUser
            parameters:
                - name: user_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: User deleted

    /v1/admin/orgs/{org_id}/limits:
        get:
            tags: [Admin]
            summary: Get org limits
            operationId: adminGetOrgLimits
            parameters:
                - name: org_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Org limits
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/OrgLimitsResponse"
        put:
            tags: [Admin]
            summary: Update org limits
            operationId: adminUpdateOrgLimits
            parameters:
                - name: org_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UpdateOrgLimitsRequest"
            responses:
                "200":
                    description: Limits updated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/OrgLimitsResponse"

    /v1/admin/orgs/{org_id}/billing-tier:
        put:
            tags: [Admin]
            summary: Set org billing tier (without Stripe)
            operationId: adminSetBillingTier
            description: |
                Manually set an organization's billing tier to free, pro, business, or enterprise.
                For testing, manual upgrades, and trial grants — does not create a Stripe subscription.
                Setting to "pro", "business", or "enterprise" sets period_end to now + duration_days (default 365).
                Setting to "free" clears subscription data. Use duration_days: 90 for a 3-month trial.
            parameters:
                - name: org_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SetBillingTierRequest"
            responses:
                "200":
                    description: Billing tier updated
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"

    /v1/admin/usage/reset:
        post:
            tags: [Admin]
            summary: Reset all API usage events (testing)
            operationId: adminResetUsageEvents
            description: |
                Deletes every row in `usage_events` for all organizations. Resets monthly
                request counts used for free-tier / x402 quota. Does not change prepaid credit
                balances or Stripe. **Platform admin only** (same guard as other `/v1/admin/*` routes).
            responses:
                "200":
                    description: Usage table cleared; returns number of deleted rows
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResetUsageEventsResponse"
                "403":
                    $ref: "#/components/responses/Forbidden"

    /v1/admin/usage/reset-for-user:
        post:
            tags: [Admin]
            summary: Reset API usage for a user's organization
            operationId: adminResetUsageForUserByEmail
            description: |
                Looks up a registered user by email and deletes all `usage_events` rows for that
                user's `org_id`. Resets free-tier / monthly quota for the whole org (not other orgs).
                **Platform admin only.**
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ResetUsageForUserEmailRequest"
            responses:
                "200":
                    description: Usage cleared for the user's org
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResetUsageForUserEmailResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"

    # ---------------------------------------------------------------------------
    # Health
    # ---------------------------------------------------------------------------

    /v1/health:
        get:
            tags: [Health]
            summary: Service health check
            operationId: healthCheck
            security: []
            responses:
                "200":
                    description: Healthy
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HealthResponse"

    /v1/health/hsm:
        get:
            tags: [Health]
            summary: HSM connectivity check
            operationId: healthHsm
            security: []
            responses:
                "200":
                    description: HSM status
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        enum: [ok, degraded, unavailable]

    # --- Shroud Activity ---

    /v1/shroud/activity:
        get:
            tags: [Shroud]
            summary: List Shroud activity events
            description: Returns recent Shroud proxy activity for the organization (LLM requests, inspections, policy actions).
            security:
                - BearerAuth: []
            parameters:
                - in: query
                  name: agent_id
                  schema:
                      type: string
                  description: Filter by agent ID
                - in: query
                  name: action
                  schema:
                      type: string
                  description: Filter by action (allowed, blocked, warned)
                - in: query
                  name: limit
                  schema:
                      type: integer
                      default: 50
                  description: Maximum events to return
                - in: query
                  name: offset
                  schema:
                      type: integer
                      default: 0
                  description: Pagination offset
            responses:
                "200":
                    description: Activity events
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    events:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/ShroudActivityEvent"
                                    total:
                                        type: integer
                "401":
                    description: Unauthorized
        post:
            tags: [Shroud]
            summary: Ingest Shroud activity event (internal)
            description: Called by the Shroud proxy to record activity events. Not intended for external use.
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/IngestShroudActivityRequest"
            responses:
                "201":
                    description: Event recorded
                "401":
                    description: Unauthorized

    /v1/shroud/threat-summary:
        get:
            tags: [Shroud]
            summary: Shroud threat analytics summary
            description: >
                Aggregated threat metrics for the organization from `shroud_activity`
                (detectors, blocked counts, recent flagged requests). Query `period` selects
                the window; the previous window of equal length is used for request volume trend.
            security:
                - BearerAuth: []
            parameters:
                - in: query
                  name: period
                  schema:
                      type: string
                      enum: [1h, 24h, 7d, 30d]
                      default: 24h
                  description: Rolling window ending now
            responses:
                "200":
                    description: Threat summary
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ShroudThreatSummary"
                "400":
                    description: Invalid period
                "401":
                    description: Unauthorized

# =============================================================================
# COMPONENTS
# =============================================================================

components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
        ApiKeyAuth:
            type: http
            scheme: bearer
            description: 1ck_ prefixed API key used as Bearer token

    parameters:
        VaultId:
            name: vault_id
            in: path
            required: true
            schema:
                type: string
                format: uuid
        SecretPath:
            name: path
            in: path
            required: true
            schema:
                type: string
            description: Secret path (e.g. "db/credentials")
        AgentId:
            name: agent_id
            in: path
            required: true
            schema:
                type: string
                format: uuid
        PolicyId:
            name: policy_id
            in: path
            required: true
            schema:
                type: string
                format: uuid
        IncludeSignedTx:
            name: include_signed_tx
            in: query
            required: false
            description: >
                Set to `true` or `1` to include the raw signed transaction hex in the response.
                Omitted by default to reduce key exfiltration risk. Only the literal values "true" or "1" enable inclusion; any other value or omission returns responses without signed_tx.
                Applies to GET /v1/agents/{agent_id}/transactions and GET /v1/agents/{agent_id}/transactions/{tx_id}.
            schema:
                type: boolean
                default: false
                example: false

    responses:
        BadRequest:
            description: Invalid request
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ProblemDetails"
        Unauthorized:
            description: Authentication required or invalid
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ProblemDetails"
        Forbidden:
            description: Insufficient permissions
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ProblemDetails"
        NotFound:
            description: Resource not found
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ProblemDetails"
        PaymentRequired:
            description: x402 payment required
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/PaymentRequirement"

    schemas:
        ProblemDetails:
            type: object
            description: RFC 7807 error envelope
            properties:
                type:
                    type: string
                title:
                    type: string
                status:
                    type: integer
                detail:
                    type: string

        ResetUsageEventsResponse:
            type: object
            required: [deleted_events]
            properties:
                deleted_events:
                    type: integer
                    format: int64
                    description: Number of usage_events rows removed

        ResetUsageForUserEmailRequest:
            type: object
            required: [email]
            properties:
                email:
                    type: string
                    format: email

        ResetUsageForUserEmailResponse:
            type: object
            required:
                [deleted_events, org_id, user_id, email, display_name]
            properties:
                deleted_events:
                    type: integer
                    format: int64
                org_id:
                    type: string
                    format: uuid
                user_id:
                    type: string
                    format: uuid
                email:
                    type: string
                display_name:
                    type: string

        # --- Auth ---

        LoginRequest:
            type: object
            required: [email, password]
            properties:
                email:
                    type: string
                    format: email
                password:
                    type: string
                    format: password

        LoginResponse:
            type: object
            properties:
                access_token:
                    type: string
                token_type:
                    type: string
                expires_in:
                    type: integer
                refresh_token:
                    type: string
                mfa_required:
                    type: boolean
                mfa_token:
                    type: string

        TokenResponse:
            type: object
            required: [access_token, token_type]
            properties:
                access_token:
                    type: string
                token_type:
                    type: string
                expires_in:
                    type: integer
                refresh_token:
                    type: string

        AgentTokenRequest:
            type: object
            required: [api_key]
            properties:
                agent_id:
                    type: string
                    format: uuid
                    description: Optional when using key-only auth (ocv_ keys auto-resolve agent)
                api_key:
                    type: string

        UserApiKeyTokenRequest:
            type: object
            required: [api_key]
            properties:
                api_key:
                    type: string

        SignupRequest:
            type: object
            required: [email, password]
            properties:
                email:
                    type: string
                    format: email
                password:
                    type: string
                    format: password
                display_name:
                    type: string

        SignupResponse:
            type: object
            properties:
                message:
                    type: string
                email:
                    type: string
                access_token:
                    type: string
                token_type:
                    type: string

        GoogleAuthRequest:
            type: object
            required: [id_token]
            properties:
                id_token:
                    type: string

        ChangePasswordRequest:
            type: object
            required: [current_password, new_password]
            properties:
                current_password:
                    type: string
                new_password:
                    type: string

        ForgotPasswordRequest:
            type: object
            required: [email]
            properties:
                email:
                    type: string
                    format: email

        ForgotPasswordResponse:
            type: object
            properties:
                message:
                    type: string

        ResetPasswordRequest:
            type: object
            required: [token, new_password]
            properties:
                token:
                    type: string
                new_password:
                    type: string

        ResetPasswordResponse:
            type: object
            properties:
                message:
                    type: string

        # --- MFA ---

        MfaStatusResponse:
            type: object
            properties:
                enabled:
                    type: boolean

        MfaSetupResponse:
            type: object
            properties:
                otpauth_uri:
                    type: string
                secret:
                    type: string

        MfaVerifySetupRequest:
            type: object
            required: [code]
            properties:
                code:
                    type: string

        MfaVerifySetupResponse:
            type: object
            properties:
                recovery_codes:
                    type: array
                    items:
                        type: string

        MfaVerifyRequest:
            type: object
            required: [code, mfa_token]
            properties:
                code:
                    type: string
                mfa_token:
                    type: string

        MfaDisableRequest:
            type: object
            properties:
                code:
                    type: string
                password:
                    type: string

        # --- Device Auth ---

        DeviceCodeRequest:
            type: object
            required: [client_id, email]
            properties:
                client_id:
                    type: string
                email:
                    type: string
                    format: email
                    description: Account email; only that user may approve the code in the dashboard.

        DeviceCodeResponse:
            type: object
            properties:
                device_code:
                    type: string
                user_code:
                    type: string
                verification_uri:
                    type: string
                    format: uri
                expires_in:
                    type: integer
                interval:
                    type: integer

        DeviceTokenRequest:
            type: object
            required: [device_code, grant_type]
            properties:
                device_code:
                    type: string
                grant_type:
                    type: string

        DeviceTokenResponse:
            type: object
            properties:
                access_token:
                    type: string
                token_type:
                    type: string
                expires_in:
                    type: integer
                error:
                    type: string
                email:
                    type: string
                user_id:
                    type: string
                org_id:
                    type: string

        DeviceApproveRequest:
            type: object
            required: [user_code]
            properties:
                user_code:
                    type: string

        UserProfileResponse:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                email:
                    type: string
                display_name:
                    type: string
                auth_method:
                    type: string
                role:
                    type: string
                email_verified:
                    type: boolean
                marketing_emails:
                    type: boolean
                totp_enabled:
                    type: boolean
                created_at:
                    type: string
                    format: date-time

        UpdateProfileRequest:
            type: object
            properties:
                display_name:
                    type: string
                marketing_emails:
                    type: boolean

        # --- API Keys ---

        CreateApiKeyRequest:
            type: object
            required: [name]
            properties:
                name:
                    type: string
                scopes:
                    type: array
                    items:
                        type: string
                expires_at:
                    type: string
                    format: date-time

        ApiKeyResponse:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                key_prefix:
                    type: string
                scopes:
                    type: array
                    items:
                        type: string
                is_active:
                    type: boolean
                created_at:
                    type: string
                    format: date-time
                expires_at:
                    type: string
                    format: date-time
                last_used_at:
                    type: string
                    format: date-time

        ApiKeyCreatedResponse:
            type: object
            properties:
                key:
                    $ref: "#/components/schemas/ApiKeyResponse"
                api_key:
                    type: string
                    description: Full key (shown once)

        ApiKeyListResponse:
            type: object
            properties:
                keys:
                    type: array
                    items:
                        $ref: "#/components/schemas/ApiKeyResponse"

        # --- Vaults ---

        CreateVaultRequest:
            type: object
            required: [name]
            properties:
                name:
                    type: string
                description:
                    type: string
                mpc_custody:
                    type: string
                    description: MPC custody mode to enable at creation (e.g. "2-of-2", "2-of-3")

        VaultResponse:
            type: object
            required: [id, name, created_at]
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                description:
                    type: string
                created_by:
                    type: string
                created_by_type:
                    type: string
                created_at:
                    type: string
                    format: date-time
                cmek_enabled:
                    type: boolean
                    description: Whether client-managed encryption is enabled
                cmek_fingerprint:
                    type: string
                    description: SHA-256 fingerprint of the CMEK key (64 hex chars)
                mpc_custody:
                    type: string
                    description: MPC custody mode (e.g. "2-of-2", "2-of-3"), absent when MPC is not enabled
                mpc_threshold:
                    type: integer
                    description: Number of shares required to reconstruct the key
                mpc_providers:
                    type: array
                    items:
                        type: string
                    description: List of MPC share providers (e.g. ["server", "client"])

        VaultListResponse:
            type: object
            properties:
                vaults:
                    type: array
                    items:
                        $ref: "#/components/schemas/VaultResponse"

        # --- CMEK ---

        EnableCmekRequest:
            type: object
            required: [fingerprint]
            properties:
                fingerprint:
                    type: string
                    description: SHA-256 hex fingerprint of the CMEK key (64 chars)

        CmekRotateRequest:
            type: object
            required: [new_fingerprint]
            properties:
                new_fingerprint:
                    type: string
                    description: SHA-256 hex fingerprint of the new CMEK key

        CmekRotationJobResponse:
            type: object
            required:
                [id, vault_id, status, total_secrets, processed, created_at]
            properties:
                id:
                    type: string
                    format: uuid
                vault_id:
                    type: string
                    format: uuid
                old_fingerprint:
                    type: string
                new_fingerprint:
                    type: string
                status:
                    type: string
                    enum: [pending, running, completed, failed]
                total_secrets:
                    type: integer
                processed:
                    type: integer
                error:
                    type: string
                started_at:
                    type: string
                    format: date-time
                completed_at:
                    type: string
                    format: date-time
                created_at:
                    type: string
                    format: date-time

        # --- MPC ---

        EnableMpcRequest:
            type: object
            required: [mpc_custody]
            properties:
                mpc_custody:
                    type: string
                    description: MPC custody mode (e.g. "2-of-2", "2-of-3")

        # --- Secrets ---

        PutSecretRequest:
            type: object
            required: [value]
            properties:
                type:
                    type: string
                    description: Secret type (generic, password, api_key, certificate, private_key, ssh_key, env)
                    default: generic
                value:
                    type: string
                metadata:
                    type: object
                    additionalProperties: true
                expires_at:
                    type: string
                    format: date-time
                rotation_policy:
                    type: object
                    additionalProperties: true
                max_access_count:
                    type: integer

        SecretMetadataResponse:
            type: object
            required: [id, path, type, version, created_at]
            properties:
                id:
                    type: string
                    format: uuid
                path:
                    type: string
                type:
                    type: string
                version:
                    type: integer
                metadata:
                    type: object
                    additionalProperties: true
                created_at:
                    type: string
                    format: date-time
                expires_at:
                    type: string
                    format: date-time
                is_disabled:
                    type: boolean
                    description: Whether this version has been disabled (retained for audit but unreadable)

        SecretCreatedResponse:
            description: Returned when a secret is created or updated. Extends SecretMetadataResponse with an optional client_share for MPC vaults.
            type: object
            required: [id, path, type, version, created_at]
            properties:
                id:
                    type: string
                    format: uuid
                path:
                    type: string
                type:
                    type: string
                version:
                    type: integer
                metadata:
                    type: object
                    additionalProperties: true
                created_at:
                    type: string
                    format: date-time
                expires_at:
                    type: string
                    format: date-time
                client_share:
                    type: string
                    description: Base64-encoded client key share. Returned only for MPC 2-of-2 vaults. The client must store this share securely — it is not persisted server-side.

        SecretResponse:
            type: object
            required: [id, path, type, value, version, created_at]
            properties:
                id:
                    type: string
                    format: uuid
                path:
                    type: string
                type:
                    type: string
                value:
                    type: string
                version:
                    type: integer
                metadata:
                    type: object
                    additionalProperties: true
                created_by:
                    type: string
                created_at:
                    type: string
                    format: date-time
                expires_at:
                    type: string
                    format: date-time
                cmek_encrypted:
                    type: boolean
                    description: Whether this secret value is CMEK-encrypted (requires client-side decryption)

        SecretListResponse:
            type: object
            properties:
                secrets:
                    type: array
                    items:
                        $ref: "#/components/schemas/SecretMetadataResponse"

        SecretVersionListResponse:
            type: object
            properties:
                versions:
                    type: array
                    items:
                        $ref: "#/components/schemas/SecretMetadataResponse"

        RotateSecretRequest:
            type: object
            properties:
                length:
                    type: integer
                    minimum: 8
                    maximum: 1024
                    description: Length of the generated value (default 32)
                charset:
                    type: string
                    enum: [hex, base64, alphanumeric, ascii]
                    description: Character set for the generated value (default hex)
                type:
                    type: string
                    description: Override the secret type (defaults to existing secret's type)

        # --- Policies ---

        CreatePolicyRequest:
            type: object
            required:
                [secret_path_pattern, principal_type, principal_id, permissions]
            properties:
                secret_path_pattern:
                    type: string
                principal_type:
                    type: string
                    enum: [user, agent]
                principal_id:
                    type: string
                permissions:
                    type: array
                    items:
                        type: string
                conditions:
                    type: object
                    additionalProperties: true
                expires_at:
                    type: string
                    format: date-time

        UpdatePolicyRequest:
            type: object
            properties:
                permissions:
                    type: array
                    items:
                        type: string
                conditions:
                    type: object
                    additionalProperties: true
                expires_at:
                    type: string
                    format: date-time

        PolicyResponse:
            type: object
            required:
                [
                    id,
                    vault_id,
                    secret_path_pattern,
                    principal_type,
                    principal_id,
                    permissions,
                    created_at,
                ]
            properties:
                id:
                    type: string
                    format: uuid
                vault_id:
                    type: string
                    format: uuid
                secret_path_pattern:
                    type: string
                principal_type:
                    type: string
                principal_id:
                    type: string
                permissions:
                    type: array
                    items:
                        type: string
                conditions:
                    type: object
                    additionalProperties: true
                expires_at:
                    type: string
                    format: date-time
                created_by:
                    type: string
                created_by_type:
                    type: string
                created_at:
                    type: string
                    format: date-time

        PolicyListResponse:
            type: object
            properties:
                policies:
                    type: array
                    items:
                        $ref: "#/components/schemas/PolicyResponse"

        # --- Agent Enrollment ---

        EnrollAgentRequest:
            type: object
            required: [name, human_email]
            properties:
                name:
                    type: string
                    description: Display name for the new agent
                human_email:
                    type: string
                    format: email
                    description: Email of the human who will receive the agent credentials
                description:
                    type: string
                    description: Optional agent description

        EnrollAgentResponse:
            type: object
            properties:
                agent_id:
                    type: string
                    format: uuid
                    description: UUID of the created agent (nil UUID when email not found — uniform response)
                message:
                    type: string
                    description: Status message (always generic to prevent email enumeration)

        # --- Agents ---

        CreateAgentRequest:
            type: object
            required: [name]
            properties:
                name:
                    type: string
                description:
                    type: string
                auth_method:
                    type: string
                    enum: [api_key, mtls, oidc_client_credentials]
                    default: api_key
                    description: Authentication method. api_key generates a one-time key; mtls requires client_cert_fingerprint; oidc_client_credentials requires oidc_issuer and oidc_client_id.
                scopes:
                    type: array
                    items:
                        type: string
                expires_at:
                    type: string
                    format: date-time
                intents_api_enabled:
                    type: boolean
                    default: false
                tx_to_allowlist:
                    type: array
                    items:
                        type: string
                tx_max_value_eth:
                    type: string
                tx_daily_limit_eth:
                    type: string
                tx_allowed_chains:
                    type: array
                    items:
                        type: string
                token_ttl_seconds:
                    type: integer
                    nullable: true
                    description: Per-agent token TTL in seconds (overrides global default)
                vault_ids:
                    type: array
                    items:
                        type: string
                        format: uuid
                    description: Restrict agent to specific vault UUIDs (empty = all vaults in org)
                client_cert_fingerprint:
                    type: string
                    description: SHA-256 fingerprint of the client certificate (required for mTLS auth)
                oidc_issuer:
                    type: string
                    description: OIDC issuer URL (required for oidc_client_credentials auth)
                oidc_client_id:
                    type: string
                    description: OIDC client ID (required for oidc_client_credentials auth)
                shroud_enabled:
                    type: boolean
                    default: false
                    description: Enable Shroud LLM Proxy for this agent
                shroud_config:
                    $ref: "#/components/schemas/ShroudConfig"

        UpdateAgentRequest:
            type: object
            properties:
                name:
                    type: string
                scopes:
                    type: array
                    items:
                        type: string
                is_active:
                    type: boolean
                expires_at:
                    type: string
                    format: date-time
                intents_api_enabled:
                    type: boolean
                tx_to_allowlist:
                    type: array
                    items:
                        type: string
                tx_max_value_eth:
                    type: string
                tx_daily_limit_eth:
                    type: string
                tx_allowed_chains:
                    type: array
                    items:
                        type: string
                token_ttl_seconds:
                    type: integer
                    nullable: true
                vault_ids:
                    type: array
                    items:
                        type: string
                        format: uuid
                shroud_enabled:
                    type: boolean
                    description: Enable/disable Shroud LLM Proxy
                shroud_config:
                    $ref: "#/components/schemas/ShroudConfig"

        AgentResponse:
            type: object
            required:
                [
                    id,
                    name,
                    auth_method,
                    is_active,
                    intents_api_enabled,
                    shroud_enabled,
                    created_at,
                ]
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                description:
                    type: string
                auth_method:
                    type: string
                    enum: [api_key, mtls, oidc_client_credentials]
                scopes:
                    type: array
                    items:
                        type: string
                is_active:
                    type: boolean
                intents_api_enabled:
                    type: boolean
                tx_to_allowlist:
                    type: array
                    items:
                        type: string
                tx_max_value_eth:
                    type: string
                tx_daily_limit_eth:
                    type: string
                tx_allowed_chains:
                    type: array
                    items:
                        type: string
                token_ttl_seconds:
                    type: integer
                    nullable: true
                vault_ids:
                    type: array
                    items:
                        type: string
                        format: uuid
                client_cert_fingerprint:
                    type: string
                    description: SHA-256 fingerprint of the client certificate (mTLS agents)
                oidc_issuer:
                    type: string
                    description: OIDC issuer URL (oidc_client_credentials agents)
                oidc_client_id:
                    type: string
                    description: OIDC client ID (oidc_client_credentials agents)
                ssh_public_key:
                    type: string
                    description: Ed25519 SSH public key (base64-encoded, auto-generated at creation)
                ecdh_public_key:
                    type: string
                    description: P-256 ECDH public key (base64 SEC1 uncompressed point, auto-generated at creation)
                shroud_enabled:
                    type: boolean
                    description: Whether this agent routes LLM traffic through the Shroud TEE proxy
                shroud_config:
                    $ref: "#/components/schemas/ShroudConfig"
                created_at:
                    type: string
                    format: date-time
                expires_at:
                    type: string
                    format: date-time
                last_active_at:
                    type: string
                    format: date-time
                smart_accounts:
                    type: array
                    description: Multi-chain; one Safe per chain
                    items:
                        $ref: "#/components/schemas/AgentSmartAccountResponse"

        AgentSmartAccountResponse:
            type: object
            description: One Safe smart account per chain for an agent
            properties:
                id:
                    type: string
                    format: uuid
                chain:
                    type: string
                chain_id:
                    type: integer
                safe_address:
                    type: string
                nonce:
                    type: string
                init_data:
                    type: object
                created_at:
                    type: string
                    format: date-time

        AddSmartAccountRequest:
            type: object
            required: [chain, chain_id, safe_address]
            properties:
                chain:
                    type: string
                chain_id:
                    type: integer
                safe_address:
                    type: string
                nonce:
                    type: string
                init_data:
                    type: object

        AgentSelfResponse:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                description:
                    type: string
                org_id:
                    type: string
                    format: uuid
                scopes:
                    type: array
                    items:
                        type: string
                is_active:
                    type: boolean
                intents_api_enabled:
                    type: boolean
                created_by:
                    type: string
                    format: uuid
                created_at:
                    type: string
                    format: date-time
                expires_at:
                    type: string
                    format: date-time
                last_active_at:
                    type: string
                    format: date-time
                ssh_public_key:
                    type: string
                    description: Ed25519 SSH public key (base64-encoded)
                ecdh_public_key:
                    type: string
                    description: P-256 ECDH public key (base64 SEC1 uncompressed point)
                shroud_enabled:
                    type: boolean
                    description: Whether this agent routes LLM traffic through the Shroud TEE proxy
                shroud_config:
                    $ref: "#/components/schemas/ShroudConfig"

        ShroudConfig:
            type: object
            description: Per-agent Shroud LLM Proxy configuration
            properties:
                pii_policy:
                    type: string
                    enum: [block, redact, warn, allow]
                    default: redact
                    description: How PII detections are handled
                injection_threshold:
                    type: number
                    minimum: 0
                    maximum: 1
                    default: 0.7
                    description: Prompt injection score threshold (0.0–1.0). Requests above are blocked
                context_injection_threshold:
                    type: number
                    minimum: 0
                    maximum: 1
                    default: 0.7
                    description: Context injection score threshold (0.0–1.0)
                allowed_providers:
                    type: array
                    items:
                        type: string
                    description: LLM providers this agent may use (empty = all)
                allowed_models:
                    type: array
                    items:
                        type: string
                    description: Specific models allowed (empty = all)
                denied_models:
                    type: array
                    items:
                        type: string
                    description: Models explicitly blocked
                max_tokens_per_request:
                    type: integer
                    description: Maximum input tokens per request
                max_requests_per_minute:
                    type: integer
                    description: Rate limit (requests per minute)
                max_requests_per_day:
                    type: integer
                    description: Rate limit (requests per day)
                daily_budget_usd:
                    type: number
                    description: Daily LLM spend cap in USD (0 = unlimited)
                enable_secret_redaction:
                    type: boolean
                    default: true
                    description: Whether vault secrets are redacted from prompts/responses
                enable_response_filtering:
                    type: boolean
                    default: true
                    description: Whether response credential scanning is active
                unicode_normalization:
                    $ref: "#/components/schemas/UnicodeNormalizationConfig"
                command_injection_detection:
                    $ref: "#/components/schemas/CommandInjectionConfig"
                social_engineering_detection:
                    $ref: "#/components/schemas/SocialEngineeringConfig"
                encoding_detection:
                    $ref: "#/components/schemas/EncodingDetectionConfig"
                network_detection:
                    $ref: "#/components/schemas/NetworkDetectionConfig"
                filesystem_detection:
                    $ref: "#/components/schemas/FilesystemDetectionConfig"
                sanitization_mode:
                    type: string
                    enum: [block, surgical, log_only]
                    default: block
                    description: Global behavior when threats are detected (block=reject, surgical=remove only malicious parts, log_only=audit without action)
                threat_logging:
                    type: boolean
                    default: true
                    description: Whether to log all detected threats to audit (even when action is allow/warn)
                tool_call_inspection:
                    $ref: "#/components/schemas/ToolCallPolicy"
                output_policy:
                    $ref: "#/components/schemas/OutputPolicy"
                secret_injection_detection:
                    $ref: "#/components/schemas/SecretInjectionConfig"
                advanced_redaction:
                    $ref: "#/components/schemas/AdvancedRedactionConfig"
                semantic_policy:
                    $ref: "#/components/schemas/SemanticPolicy"
                flagged_request_retention_days:
                    type: integer
                    minimum: 0
                    maximum: 365
                    description: Number of days to retain flagged request bodies for replay/investigation

        UnicodeNormalizationConfig:
            type: object
            description: Unicode normalization and homoglyph detection settings
            properties:
                enabled:
                    type: boolean
                    default: true
                    description: Enable Unicode normalization
                strip_zero_width:
                    type: boolean
                    default: true
                    description: Remove zero-width and invisible Unicode characters
                normalize_homoglyphs:
                    type: boolean
                    default: true
                    description: Replace look-alike characters (e.g., Cyrillic а → Latin a)
                normalization_form:
                    type: string
                    enum: [NFC, NFKC, NFD, NFKD]
                    default: NFKC
                    description: Unicode normalization form to apply

        CommandInjectionConfig:
            type: object
            description: Shell/command injection detection settings
            properties:
                enabled:
                    type: boolean
                    default: true
                    description: Enable command injection detection
                action:
                    type: string
                    enum: [block, sanitize, warn, log]
                    default: block
                    description: Action when command injection is detected
                patterns:
                    type: string
                    enum: [default, strict, custom]
                    default: default
                    description: Pattern strictness level
                custom_patterns:
                    type: array
                    items:
                        type: string
                    description: Custom regex patterns for detection (only used when patterns=custom)

        SocialEngineeringConfig:
            type: object
            description: Social engineering and manipulation detection settings
            properties:
                enabled:
                    type: boolean
                    default: true
                    description: Enable social engineering detection
                action:
                    type: string
                    enum: [block, warn, log]
                    default: warn
                    description: Action when manipulation attempts are detected
                sensitivity:
                    type: string
                    enum: [low, medium, high]
                    default: medium
                    description: Detection sensitivity level

        EncodingDetectionConfig:
            type: object
            description: Encoding/obfuscation detection settings
            properties:
                enabled:
                    type: boolean
                    default: true
                    description: Enable encoding detection
                action:
                    type: string
                    enum: [block, decode, warn, log]
                    default: warn
                    description: Action when obfuscated content is detected
                detect_base64:
                    type: boolean
                    default: true
                    description: Detect Base64-encoded content
                detect_hex:
                    type: boolean
                    default: true
                    description: Detect hex-encoded content (\\x41, 0x41)
                detect_unicode_escape:
                    type: boolean
                    default: true
                    description: Detect Unicode escape sequences (\\u0041)

        NetworkDetectionConfig:
            type: object
            description: Suspicious URL/domain detection settings
            properties:
                enabled:
                    type: boolean
                    default: true
                    description: Enable network/URL detection
                action:
                    type: string
                    enum: [block, warn, log]
                    default: warn
                    description: Action when suspicious URLs are detected
                blocked_domains:
                    type: array
                    items:
                        type: string
                    description: Domains to always block (e.g., pastebin.com, ngrok.io)
                allowed_domains:
                    type: array
                    items:
                        type: string
                    description: Domains to always allow (allowlist mode when non-empty)

        FilesystemDetectionConfig:
            type: object
            description: Filesystem path detection settings
            properties:
                enabled:
                    type: boolean
                    default: false
                    description: Enable filesystem path detection (disabled by default as it can be noisy)
                action:
                    type: string
                    enum: [block, sanitize, warn, log]
                    default: log
                    description: Action when filesystem paths are detected
                blocked_paths:
                    type: array
                    items:
                        type: string
                    description: Path patterns to block (e.g., /etc/passwd, ~/.ssh)

        ToolCallPolicy:
            type: object
            description: Tool/function call inspection settings
            properties:
                enabled:
                    type: boolean
                    default: false
                    description: Enable tool call inspection
                allowed_tool_names:
                    type: array
                    items:
                        type: string
                    description: Allowed tool/function names (empty = all allowed)
                denied_tool_names:
                    type: array
                    items:
                        type: string
                    description: Denied tool/function names
                scan_arguments:
                    type: boolean
                    default: true
                    description: Scan tool call arguments for credential exfiltration
                block_credential_exfil:
                    type: boolean
                    default: true
                    description: Block tool calls that appear to exfiltrate credentials
                action:
                    type: string
                    enum: [block, sanitize, warn, log]
                    default: block
                    description: Action when a tool call violation is detected

        OutputPolicy:
            type: object
            description: Output content policy settings for LLM responses
            properties:
                enabled:
                    type: boolean
                    default: false
                    description: Enable output content policies
                blocked_patterns:
                    type: array
                    items:
                        type: string
                    description: Custom regex patterns to block in responses
                blocked_entities:
                    type: array
                    items:
                        type: string
                    description: Named entities to block (e.g., competitor names)
                block_harmful_content:
                    type: boolean
                    default: false
                    description: Block responses containing harmful content categories
                harmful_categories:
                    type: array
                    items:
                        type: string
                        enum: [violence, self_harm, illegal, hate, sexual, malware]
                    description: Harm categories to block
                action:
                    type: string
                    enum: [block, sanitize, warn, log]
                    default: warn
                    description: Action when output policy is violated

        SecretInjectionConfig:
            type: object
            description: Detects credentials injected into prompts that are not from the vault
            properties:
                enabled:
                    type: boolean
                    default: false
                    description: Enable secret injection detection
                action:
                    type: string
                    enum: [block, sanitize, warn, log]
                    default: block
                    description: Action when injected credentials are detected
                sensitivity:
                    type: string
                    enum: [low, medium, high]
                    default: medium
                    description: Detection sensitivity level

        AdvancedRedactionConfig:
            type: object
            description: Advanced secret redaction settings (base64-encoded, split, prefix leaks)
            properties:
                enabled:
                    type: boolean
                    default: false
                    description: Enable advanced redaction checks
                detect_base64_encoded:
                    type: boolean
                    default: false
                    description: Detect base64-encoded vault secrets
                detect_split_secrets:
                    type: boolean
                    default: false
                    description: Detect secrets split across tokens or messages
                detect_prefix_leak:
                    type: boolean
                    default: false
                    description: Detect partial/prefix leaks of vault secrets
                min_secret_length:
                    type: integer
                    default: 16
                    description: Minimum secret length to consider for advanced matching

        SemanticPolicy:
            type: object
            description: Semantic/intent-level policy enforcement
            properties:
                enabled:
                    type: boolean
                    default: false
                    description: Enable semantic policy enforcement
                allowed_topics:
                    type: array
                    items:
                        type: string
                    description: Topics the agent is allowed to discuss (empty = all)
                denied_topics:
                    type: array
                    items:
                        type: string
                    description: Topics to block
                allowed_tasks:
                    type: array
                    items:
                        type: string
                    description: Tasks the agent is allowed to perform (empty = all)
                denied_tasks:
                    type: array
                    items:
                        type: string
                    description: Tasks to block (e.g., code_generation, data_export)
                action:
                    type: string
                    enum: [block, sanitize, warn, log]
                    default: warn
                    description: Action when semantic policy is violated

